<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin: Highland Peptides</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<header class="topbar">
  <div class="brand">Admin Dashboard</div>
  <nav><button id="adminLogoutBtn" style="display:none;">Log Out</button></nav>
</header>

<main style="display:block; max-width: 1400px;">
  <section id="adminLogin" class="panel">
    <h2>Admin Login</h2>
    <form id="adminLoginForm">
      <label>Password <input type="password" id="adminPassword" required></label>
      <button type="submit">Log In</button>
      <p class="form-msg" id="adminLoginMsg"></p>
    </form>
  </section>

    <section id="adminPanels" style="display:none;">
    <div class="admin-tabs" role="tablist" aria-label="Admin sections">
      <button type="button" class="admin-tab active" data-admin-tab="orders">Orders</button>
      <button type="button" class="admin-tab" data-admin-tab="profit">Profit</button>
    </div>
    <div class="panel admin-tab-panel" id="ordersPanel" data-admin-panel="orders">
      <h2>Orders <span class="hint">(guest checkout, no accounts to review)</span></h2>
      <table id="ordersTable" style="width:100%; border-collapse: collapse;"></table>
    </div>
    <div class="panel admin-tab-panel" id="profitPanel" data-admin-panel="profit" hidden>
      <h2>Profit <span class="hint">(paid and fulfilled orders only)</span></h2>
      <div id="profitSummary"></div>
      <table id="profitTable" style="width:100%; border-collapse: collapse;"></table>
    </div>
  </section>
</main>

<script src="/js/admin.js"></script>
</body>
</html>
